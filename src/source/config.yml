    accessRights :  http://publications.europa.eu/resource/authority/access-right/PUBLIC
    accrualPeriodicity : http://publications.europa.eu/resource/authority/frequency/IRREG
    dct.language : http://publications.europa.eu/resource/authority/language/NLD
    landingPage  : https://data.omgeving.vlaanderen.be/doc/catalog/codelijst.html
  catalog :
    title: "Catalogus van datasets van codelijsten."
    description: "Catalogus van datasets van codelijsten die onder het domein data.omgeving.vlaanderen.be gepubliceerd worden."
    id : https://data.omgeving.vlaanderen.be/id/catalog/codelijst
    type: http://www.w3.org/ns/dcat#Catalog
  dataset :
    title: "Dataset van de codelijst van variabelen voor het Chemische Stoffen en Omgevingsparameters-Register (CSOR)."
    description: "Deze dataset bevat de codelijst van variabelen voor het Chemische Stoffen en Omgevingsparameters-Register (CSOR) van de Vlaamse overheid, Departement Omgeving. Een variabele is een kenmerk dat geobserveerd kan worden, los van de context waarin de observatie gebeurt, hoe de observatie gebeurt of hoe de waarde van de observatie wordt vastgelegd. De codelijst bevat 1691 variabelen gepubliceerd als SKOS concept scheme via Linked Data."
    temporal : https://data.omgeving.vlaanderen.be/id/periodoftime/dataset_omg
    type : http://www.w3.org/ns/dcat#Dataset
    provenance:
      label: "Deze codelijst van variabelen voor het CSOR-register is een representatie van chemische stoffen en omgevingsparameters die geobserveerd kunnen worden in het kader van milieudoelstellingen van de Vlaamse overheid, Departement Omgeving."
  distribution :
    parquet:
      title: "Codelijst van variabelen voor het CSOR, geserialiseerd als parquet-formaat."
